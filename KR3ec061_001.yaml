body:
  text: 卷之一上草部山草類人參大補能回元氣於無有性味甘溫肺家專藥功用靈活五臟之虛隨所引而至益五臟之陽生陰生血陽自生而陰自長退虛火止煩渴所謂甘溫能除大熱也若大虛吐衄生噙咽汁乃氣不攝血血脫益氣耳參條補力稍減有橫行手臂之功參蘆湧吐虛痰參鬚降泄虛逆有一種小者名太子參氣質稍嫩其用不下大參參葉苦寒雖有瀉熱生津之用而苦寒之性不甚益人虛甚者忌之珠兒參甘寒微苦入肺而瀉熱補虛用代沙參之不及性味稍沉胃虛者不宜多用會蘭參補虛功在珠參之上力近東洋元虛挾微熱而消渴者較勝其性甘涼可知潞黨參味甘微溫補益中氣臟平無火元氣微虛者宜之有一種西黨參微甘帶辛宜入補托藥用白黨參氣味辛劣用之發散虛邪不入補劑紅黨參味甘性潤益血補虛最為平穩但力薄耳西洋參苦寒微甘補氣清肺氣味濃厚功在珠參之上胃虛不耐寒涼者宜久制用東洋參氣味甘平力能補虛退熱無寒涼損胃之虞殊勝西洋足稱良劑惟產虛羸弱久痢忌高麗參性溫氣浮味甘純補大能退表虛寒熱稍遜人參之引用靈活耳北沙參甘淡性涼補虛退熱益五臟之陰肺虛勞熱者最宜之傷寒溫疫肺虛挾熱者亦可暫用桔梗辛苦性平色白入肺力能清咽利膈表散外邪肺氣滯於大腸者宜桔梗開之為諸藥舟楫能引沉降之品至於至高之分成功有一種甜者兼能解毒又名薺苨亦可偽參甘草性味甘平生用緩中氣瀉火炙用溫元氣補中和藥解毒中滿忌之節行肢節頭入吐劑梢入莖中葳蕤即玉竹甘平性潤補中益氣為風溫咽痛專藥用代參蓍功力稍緩黃精性味甘平補益中氣潤養精血功力輕緩稍遜玉竹一籌黃蓍性味甘溫生用托邪實表炙用補中益氣但其性滯不似人參之靈活白朮苦甘性溫生用豁痰利水炒焦燥濕健脾制熟補脾潤燥炒黑止血醒脾其利腰臍結血有健脾之功蓋脾健氣運則結血自解野生者氣清於潛者力倍種收者氣濁第可調補錄用斷難挽回生死若陰虛燥熱肝腎有動氣者均忌蒼朮苦溫辛烈燥胃強脾發汗除濕能升發胃中陽氣辟惡解鬱產茅山者真米泔浸焙亦有麻油炒者燥結多汗忌天麻味辛性溫入肝經氣分諸風掉眩頭旋眼黑屬風痰滯伏者非此不除濕紙包煨熟用子名還筒子能定風益虛若血液衰少非真有風邪者忌用秦艽辛苦性平祛風勝濕活血舒筋入手足陽明肝膽亦治骨蒸潮熱利大小便左紋者良柴胡味苦微寒生用升陽解表能引清氣上行而平少陽厥陰之邪熱止諸瘧寒熱入肝膽心包三焦酒炒則引入血分治熱入血室鹽水炒除煩熱鱉血炒退骨蒸醋炒則專入肝經而調經散結為解表和里之專藥性雖上升多用不能下泄其梢專於達下其苗搗汁滴治耳聾若陰虛無邪氣升火炎者均為切禁銀州柴胡較軟柴胡性味稍平入肝腎而專治虛勞煩熱骨蒸髓熱干長微白者良前胡苦辛甘平入肺而消痰下氣解熱疏風為風邪咳嗽之專藥氣香質嫩者良無外感者勿用按柴胡前胡均是風藥但柴胡性升前胡性降為異川獨活辛苦微溫氣緩善搜入足少陰氣分以理伏風而勝濕痙癇濕痹並宜之西羌活性苦性溫氣雄而散入足太陽經以理遊風而勝濕解利周身百節之痛為撥亂反正之專藥如血虛身痛頭疼不因風寒濕邪者二活並忌青防風辛甘微溫入足太陽經搜肝瀉肺又行脾胃二經為去風勝濕之要藥無外邪者勿用綠升麻甘辛苦平入手足陽明太陰生用表散風邪升散火鬱炒用能升陽氣於至陰之下引甘溫之藥上行以補衛氣之散而實其表陰虛火升者忌之按柴胡升麻均是升藥但柴胡從左升引少陽清氣上行升麻從右升引陽明清氣上行為異北細辛性溫味辛表散寒邪兼祛浮熱乃手少陰引經足少陰本藥味極辛能行水氣以潤燥性極刃烈不可多用獨用遠志苦辛性溫散郁泄熱入手少陰經能通腎氣上達於心利九竅交心腎甘草水浸用若純虛無滯郁者勿用葉名小草止泄益陰金毛狗脊苦甘微溫滋腎益肝除風虛濕痹強腰腳利機關為滋補虛痹良藥淫羊霍辛香甘溫入肝腎而興陽益精羊脂拌炒用相火易動者遠之巴戟天甘辛微溫入腎命血分除風氣腳氣強腰壯膝酒浸焙用陰虛相火熾者忌之瑣陽性味甘溫入腎命而興陽潤燥大便滑泄強陽精不固者均忌肉蓯蓉甘酸鹹溫入腎命血分潤燥興陽峻補精血功近瑣陽酒浸洗去甲酥炙用禁忌亦與瑣陽相同肥白芨苦辛性平氣澀而收質潤兼補入肺止吐血衄血肺損者能復生之參三七甘苦微溫散血止血定痛能損新血吐衄無瘀者勿服草三七功用相仿性味稍烈藜藿輩宜暫用之地榆苦酸微寒性沉而澀入下焦血分除血痢止腸風俱炒炭用梢反行血與根相反紫丹參味苦色赤氣平而降入心與包絡破宿血生新血兼四物為女科要藥雖能補益長於行血血虛無瘀者勿用元參苦甘微寒入肺腎二經除煩止渴解毒利咽瀉無根浮游之火脾虛泄瀉忌亦有焙熟用者苦參大苦燥濕大寒勝熱沉降入腎功專解毒消癰肝腎虛而無濕熱者忌之龍膽草大苦大寒沉陰下行入肝膽瀉火兼入膀胱腎經以除下焦之濕熱酒洗亦能上行大損胃氣無實火者忌用川黃連大苦大寒入心瀉火而燥脾濕瀉火生用燥濕炒用豬膽汁炒治肝膽火酒炒治上焦火薑汁炒治中焦火鹽水炒治下焦火吳茱湯炒治濕熱在肝膽氣分醋炒治濕熱在心脾血分無實熱者均忌連非川產反能瀉人胡黃連性味苦寒涼驚瀉熱益肝膽厚腸胃治大人骨蒸小兒疳熱禁忌同川黃連黃芩性味苦寒瀉肺火退寒熱中虛者名枯芩入肺以清肌表之熱內實者名條芩入大腸而清熱安胎瀉火生用退寒熱酒炒用紫草甘鹹氣寒入厥陰血分而涼血活血為痘瘡血熱專藥便滑者忌之肥知母辛苦寒滑瀉陽明有餘之熱滋少陰不足之陰潤燥止咳除煩安胎酒浸炒清上鹽水炒滋下便滑者均忌之川貝母味甘微寒涼心散郁清肺而化熱痰象貝形堅味苦瀉熱功勝不能解鬱也土貝形大味苦瀉熱解毒外科專藥俱去心用之白頭翁苦堅腎寒涼血入陽明血分兼入厥陰除熱痢下重血分無熱者忌之白前辛甘微寒入肺而消痰降氣能除肺實氣壅肺虛者忌之白薇苦鹹微寒陽明衝任之藥退熱益陰宜於血熱血虛者忌之白茅根性味甘寒入肺而涼血止血針可潰膿花能止衄白蘚皮味甘性燥氣寒散行入脾胃而除濕熱兼入小腸膀胱行水道利竅通關為諸風頑痹專藥下部虛寒雖有濕症勿用延胡索辛苦性溫入手足厥陰太陰能行血中氣滯氣中血滯生用破血炒用調血酒炒活血醋炒止血必須炒黑若經事先期血虛崩中均忌落得打性味甘平治跌打損傷金瘡出血並用其根煎湯洗之酒炒行血醋炒止血搗爛則黏可塗傷腫開金鎖性味苦辛善祛風濕治手足不遂筋骨疼痛與蒼朮當歸同用甚效冬蟲夏草性味甘平滋腎保肺功專止血化痰能已勞嗽冬在土中身活如老蠶有毛能動至夏則毛出土上連身俱化為草若不取則至冬復化為蟲錦地蘿性平微苦治山嵐瘴毒並諸中毒瘡毒以根搗汁酒服一錢即解水仙根味苦微辛性寒體滑瀉熱解毒搗塗癰疽暴腫花名金盞銀臺作香澤塗身去風氣又療婦人五心煩熱卷之一中草部芳草類當歸甘辛苦溫入心肝脾三經為養血溫藥血滯能通血虛能補血枯能潤血亂能撫頭止血而上行身養血而中守尾破血而下行全活血而流走酒炒活血醋炒止血極善滑腸泄瀉忌用如不得已土炒可以益脾糯粉炒可以厚胃用者詳之白芍藥苦酸微寒入肝脾血分為手足太陰行經瀉肝火斂陰血安脾肺固腠理乃血虛腹痛之專藥瀉火生用斂陰炒用酒炒和血醋炒止血赤芍藥苦辛微寒瀉肝火散惡血酒炒活血醋炒亦能止血必須炒黑乃治血瘀經絡不能歸經之血如血虛者切忌按白芍補而斂陰赤芍散而瀉血白益肝能於土中瀉木故瀉痢虛弱宜之赤散邪能行血中之滯故傷寒營實宜之川芎辛溫升浮入手足厥陰為足少陽引經升清陽而開諸郁潤肝燥而補肝虛上行頭目下行血海乃搜風散滯止痛調經之專藥但辛竄之劑氣升火炎者忌單服久服令人暴亡牡丹皮辛苦微寒入手足少陰厥陰瀉血中伏火散瘀除煩退無汗之骨蒸生用涼血酒炒和血妊婦忌之澤蘭葉味苦甘辛氣香微溫入足太陰厥陰泄熱行血利竅消腫為產科專藥無瘀勿用按澤蘭走血分消水腫是治血化為水之水藥蘭香草一類二種走氣分為消渴良藥即數食肥甘傳為消渴治之以蘭除陳氣也馬蘭根葉性味辛涼瀉熱解毒為陽明血分之藥川鬱金辛苦微甘氣香性寒入心與包絡兼入肺肝涼心散郁破血下氣為氣中血藥婦人經脈逆行血氣刺痛摩服效速若吐衄不因氣逆者忌廣鬱金破氣破血少解鬱化氣之功草鬱金性味尤烈藜藿體實暴怒氣逆血滯者可以暫用薑黃味苦辛溫色黃入脾兼入肝經破氣散血烈於鬱金片子薑黃橫行手臂理血中之氣可為風寒濕痹引經蓬莪朮辛苦性溫氣中血藥入肝散瘀行氣消癥瘕痃癖醋摩醋炒烈於鬱金虛人酌用荊三稜性味苦平血中氣藥入肝破瘀開結消堅積老塊醋炒麵煨其力峻於蓬朮虛人忌之金香附即莎草子辛苦微甘氣香性溫入十二經能行血中之氣解鬱調經安胎利產為女科專藥生用上行胸膈外達皮膚炒用下達腎肝旁徹腰膝鹽水炒軟堅潤下童便制散瘀除蒸青鹽炒入腎調氣酒浸炒入肝行經醋浸炒消積聚薑汁炒化痰飲四制調經炒黑止血陰血燥均當忌之廣木香辛香苦溫入三焦氣分升降諸氣力能泄肺疏肝和脾安胎調氣生摩厚腸煨用有一種青木香味稍較苦功專入肝疏逆為疝氣專藥馬兜鈴根亦名青木香亦可治疝性稍涼耳砂仁即縮砂蔤辛溫香入脾胃而快氣調中通行結滯止痛安胎多服耗氣炒研去衣用白豆蔻性味辛溫流行三焦快膈散滯為肺家本藥兼入脾胃去殼炒研用殼主寬胸開胃力較薄耳草豆蔻辛溫氣散燥濕散滯溫胃祛風微炒用草果性味辛烈入胃而破氣除痰消食化積炒熟取仁用按草果知母一陰一陽草果治太陰獨勝之寒知母治陽明獨勝之熱肉豆蔻即肉果辛溫氣香暖胃醒脾固中澀腸麵裹或糯粉包煨研細用吐瀉初起忌之破故紙即補骨脂辛苦大溫入心包命門補火生土燥濕止瀉鹽水炒用多服單服能下氣益智仁性味辛溫入脾而兼入心命開心益智能通君相補火攝涎縮小便鹽水炒用泄瀉遺濁有熱者均忌蛇床子辛苦性溫入腎命而祛風燥濕除下體濕癢惡瘡為外科專藥蓽茇性味辛熱逐胃冷祛痰涎下氣散浮熱止牙痛頭痛醋焙用性能耗氣動火不可多用高良薑辛熱性烈祛寒逐冷除中脘作痛如冰子名紅豆蔻性稍輕浮入脾肺而祛寒散結微炒用廣藿香辛溫芳香入手足陽明太陰二經力能醒脾祛暑快胃闢穢為吐瀉腹痛專藥梗主和胃化氣而少溫散之力土藿香但能溫胃殊欠芳香之用鮮藿滴露氣味清徹善能達邪暑症寒熱最宜白芷性味辛溫色白入肺氣香入脾發手足陽明之表祛風燥濕治頭面口齒諸疾血虛火炎者忌之藁本辛溫氣雄善祛風寒濕邪入太陽而兼治督脈頭痛上連巔頂帶濁由清陽下陷必需之香薷穗性味辛溫散暑理濕為夏月冒暑解表之藥無表邪者忌荊芥穗辛苦性溫芳香氣散入肺肝氣分兼入血分為風邪血病之專藥治風生用治血炒黑用然惟風在皮裡膜外者宜之若風入骨肉又須防風不得混用紫蘇葉辛溫色紫入肺而祛寒發表調氣和血安胎定喘氣虛者禁用蘇子消痰理嗽散郁定喘炒研用腸滑者忌蘇梗順氣安胎功力稍緩虛人最宜雞蘇即水蘇又名龍腦薄荷性味雖與紫蘇相近但辛烈走氣不入湯劑薄荷葉性味辛涼散風熱清利頭目搜肝肺宣滯解鬱但辛香耗氣多服損人蘇產者良甘松香辛溫芳香稍帶甘味功專調氣解鬱開胃醒脾香散甚於藿香虛人量用山奈性味辛溫溫中闢瘴散氣烈於甘松虛人不宜輕用奶酣草芳香辛溫溫中辟惡禁忌同於山奈茉莉花性味辛溫色白入肺芳香入脾功專闢穢治痢虛人宜之卷之一下草部隰草類鮮生地味苦大寒稍帶微甘入心腎二經涼血散瘀瀉熱益陰為血瘀熱結之專藥血分無實熱者忌之乾生地苦甘性寒沉陰主降入手足少陰厥陰兼入手太陽經滋陰退熱涼血生血調經安胎利大小便為陰虛挾熱之專藥脾虛泄瀉胃虛食少者均忌然亦有炒鬆炒炭用者蓋炒鬆能去血中之濕炒炭能止濕熱傷陰之血也小生地功力甚薄只宜血熱之人根生地瀉血中之熱均無滋陰益血之功瘡瘍痘疹並宜之熟地黃微甘微溫入足三陰經滋腎水封填骨髓養血液補益真陰為補陰壯水之專藥陰虛無熱最宜之但性能膩膈痰多氣鬱之人宜酌用亦有熟砂仁末拌炒鬆用者修制俱忌鐵器旱蓮草一名鱧腸又名金陵草甘鹹微寒汁黑入腎益陰涼血功勝脾虛作瀉腎虛腹痛均忌麥門冬甘寒微苦清心潤肺瀉熱除煩為生津止嗽之專藥去心用其性寒凝潤滑肺燥邪熱初解脾胃虛寒泄瀉均忌然亦可糯粉炒用勿滑硃砂拌用鎮心甘菊花甘苦微寒清鬱熱兼益金水平肝木解熱熄風為明目清頭善解鬱熱之專藥菊葉搗汁能拯疔毒垂危穀精草辛溫輕浮啟胃舒陽善發少陽陽明清氣功專明目退翳為眼科發光專藥草決明即馬蹄決明一名決明子甘苦鹹平入肝除風熱退目翳為明目粹光專藥葉作菜食利五臟以明目青葙子亦名草決明味苦微寒入厥陰而除風泄熱專治目疾瞳子散大者忌木賊草甘苦性平治目疾暴發除翳膜遮睛去節能發汗多服損肝賊目故名麻黃辛溫微苦入足太陽兼入手少陰陽明而為肺家專藥為發汗散邪通關利竅風寒表實者宜之去節用不可過劑蜜炙痰哮氣喘屬邪實病痼者根節獨能止汗刺蒺藜一名白蒺藜辛苦微溫入肝而疏肝明目解散風邪微炒或人乳拌蒸用沙菀蒺藜性味苦溫微澀固精秘氣補腎強腰為腎虛竅滑不勝酸澀專藥鹽水炒研用益母草一名茺蔚辛苦微寒入手足厥陰行血去瘀為經產專藥無瘀勿用茺蔚子性味略同更能調經活血令人有子微炒非血滯者不可用夏枯草辛苦微寒入厥陰而緩肝解熱散結消癭久服亦能傷胃青蒿葉苦寒芬芳得春生之氣最早入少陽厥陰除煩清暑退熱除蒸為勞熱暑熱專藥梗兼和胃建連翹味苦微寒其性輕浮其形象心入手少陰厥陰兼入手足少陽手陽明經瀉火散結解毒消癰多餌亦能減食紫花地丁辛苦性寒瀉熱解毒為外科敷治專藥漏蘆性味苦鹹軟堅消癭瀉熱解毒為外科專藥大力子一名惡實一名牛旁子一名鼠黏子辛苦微寒入肺而疏風散結瀉熱清咽消斑疹利二便腸滑者忌亦有土炒用者大小薊甘苦性涼俱能涼血散瘀但小薊力微不能如大薊之能消癰毒馬鞭草味苦微寒破血通經殺蟲消脹取苗葉用虛人忌之劉寄奴性味苦溫破血通經除脹止血莖葉花子皆可用多服令人吐利紅花古名紅藍花辛苦甘溫入肝治血少用活血和血多用破血行血子散血結葉塗癰腫王不留行甘苦性平行走不住善入血分通經下乳乃陽明沖任之藥取苗子漿水浸蒸熟用孕婦及氣血虛人並忌之瞿麥穗性味辛寒利小腸而降心火逐膀胱濕熱為通淋要藥即落陽花取蕊殼用萹蓄一名扁竹性味苦平利水通淋為治疸消腫專藥車前子性味甘寒入膀胱而兼入肺肝為利水清熱之藥開水竅以安精竅令人生子強壯炒研用腎虛氣陷及精竅滑泄者均忌車前葉性味相近清熱功勝兼能涼血明目莖葉勿可並使燈心甘淡微寒降心火而利小腸兼清肺熱燈草燒灰吹喉痹塗乳止夜啼中寒小便不禁者勿服地膚子甘苦微寒入膀胱而除浮腫利小便而通淋閉炒研用葉作浴湯去皮膚風熱丹腫冬葵子甘寒淡滑利竅滑胎根葉同功花分赤白治白帶下赤者亦治血淋海金沙甘寒淡滲除小腸膀胱血分濕熱為血淋要藥茵陳蒿性味苦寒入足太陽兼入足太陰陽明專利濕熱為黃疸君藥甜葶藶辛苦大寒入肺而兼入膀胱其性急速下氣定喘喘鳴水氣噴急者非此不能除為瀉表氣分濕熱專藥取子炒研苦者性劣不可輕投大青苦鹹大寒入心胃而解斑毒熱狂取莖葉用無實熱者忌漂青黛性味鹹寒色青入肝解五臟鬱火無實火者忌白蘆根性味甘寒入胃而降火止嘔蘆筍能解魚蟹河豚毒嘔噦反胃由中寒者勿服豨薟草味苦微辛生寒熟溫入肝胃而透骨搜風理濕除痹酒拌蒸曬九次蜜丸亦可入煎多服燥血旋覆花苦辛鹹平入肺大腸經下氣定喘軟堅化痰為疏理風氣水濕專藥密絹包虛人酌用根能續筋紫菀茸苦辛溫潤入肺而化氣開結理虛嗽止血為治血痰專藥陰虛肺熱不宜多用獨用亦可鹽水或蜜水炒用白者名女菀功用相近但入氣分為異款冬花性味辛溫入肺而潤燥化痰除煩止咳為肺虛咳嗽專藥去梗用花虛甚蜜炙淮牛膝苦酸性平入足厥陰少陰炒用性溫益肝腎強筋骨能引諸藥下行生用利二便散惡血酒炒入肝鹽水炒入腎川產長於利濕杜產名天明精一名地松去瘀功勝氣陷便泄精滑者並忌川續斷苦辛微溫入肝腎而理傷續筋通經安胎酒炒用胡蘆芭苦溫純陽入腎命而主降治疝壯元陽祛冷濕為腎虛腹中冷痛之專藥炒研用陰虛火炎者忌蘄艾葉味苦大辛生溫熟熱入三陰而祛寒理血止痛調經為暖子宮專藥灸火通十二經陽氣治寒濕痹痛野艾但能灸火不入湯劑木綿性味甘溫燒灰治血崩金瘡子散結治乳癰油辛熱損目有木草二種雞冠花性味甘涼專去濕熱治赤白下利帶下崩中子治腸風苗塗瘡痔與青葙子一類兩種元寶草性味辛寒益陰而止吐血衄血生江浙田塍間雪裡青味苦大寒瀉熱解毒搗汁灌咽喉善開結閉渣塗癰腫能潰散萬年青味甘性寒瀉熱湧痰搗汁入醋少許灌之立可吐痰則咽喉自解子善催生白米飯草一名糯米飯草性味甘平潤肺止嗽益胃和中可治勞傷花力尤勝淡竹葉甘淡微寒利小便除煩熱孕婦忌之蓍實苦酸性平益氣充飢久服不餓蓍葉同獨蒜甲片食鹽米醋搗餅貼癖兩炷香癖可化血從便出箬葉性味甘溫利肺氣通小便陳久者良芭蕉根味甘大寒瀉熱解毒寬脹消癰搗汁用苧麻根性味甘寒破血解毒止天行腹痛搗汁用軋麻亦可煎湯無根麻亦可代萱草性味甘涼解利濕熱快膈悅志令人歡樂無憂故令合歡草又名無憂草根治砂淋下水氣石龍芮性味苦平補陰氣不足令人皮膚光澤取子用堇葉一名水堇俗呼胡椒菜性味甘寒微辛苦澀除煩熱下瘀血為散結解毒專藥狗尾草一名光明草性味辛寒眼科拳毛倒睫翻轉目瞼以三莖蘸水戛去惡血良敗醬一名苦菜性味苦寒瀉熱解毒破血排膿為外科專藥取根苗用薇銜一名鹿銜南人名吳風草味性苦平理血中之濕善治酒風濕痹歷節諸痛馬藺子一名蠡實性味甘溫治寒疝冷積諸痛石龍芻即龍鬚草味苦微寒通淋止痛敗席有垢者功勝酸漿即燈籠草性味苦寒清肺止咳佛耳草治寒痰咳嗽此治熱痰咳嗽力能解利濕熱亦治黃病鼠麴草即佛耳草性味甘平除痰止嗽雜米粉作糗食之甜美荒年可以充飢卷之二上草部毒草類川附子辛甘大熱入腎命而通行十二經生用暖腎臟以祛寒濕熟用補命火以回元陽鹽水炒黑專入腎臟燥濕功勝兼益元氣下寒上熱裡寒外熱之症最宜川烏頭即附子之母氣味輕疏善祛風寒濕痹不能如附子有頃刻回陽之功痹症氣實者宜之薑汁炒或生用寒疾宜附子風疾宜烏頭烏附尖性專達利用以湧吐濕痰最捷天雄獨顆無附即雄附子性味雖雄但能溫經逐冷不能頃刻回陽濕痹寒甚宜之側子旁生功力稍遜能旁達四肢但可發散寒痹無附子之補力也漏藍初生未成雖治冷痹惡瘡非寒毒深痼勿用草烏頭辛苦大熱力能開頑痹以化痰搜風毒以勝濕非生薑汁炒透令人麻悶仍須以生薑汁解之虛人不可輕用烏啄兩岐相合性味不純不堪服食遠之可也白附子辛甘性熱入陽明而善祛遊走之風能引藥勢上行治頭面百病虛者忌之天南星一名虎掌辛苦性溫入肝脾肺而祛風燥濕散結除痰礬湯泡炒用陳膽星臘月取南星末入黃牛膽中和汁風乾專化風痰以益肝膽年久彌佳半夏辛溫性燥入脾胃而化痰止嘔燥濕醒脾生薑汁製透用半夏曲以半夏末入面作曲盒生黃衣性稍和緩能治血虛伏濕之痰霞天曲以霞天膏渣入半夏末和造龕成能治中虛沉痼之痰霞天膏以嫩黃牛肉煮取淨汁煎煉成膏大補中虛羸弱按南星半夏均是燥藥但南星治風痰半夏治濕痰為不同常山辛苦性寒吐痰逐飲能截諸瘧虛人忌之按常山吐瘧痰藜蘆吐風痰瓜蒂吐熱痰烏附尖吐濕痰萊菔子吐氣痰蜀漆即常山苗功用相近性稍輕揚耳藜蘆根辛寒至苦入口即吐善於通頂令人嚏虛人慎用紫大戟辛苦性寒泄閉瀉水按大戟能瀉臟腑水飲甘遂能行經絡水飲白芥子能散皮裡膜外痰氣三味同劑名控涎丹虛人不可輕用甘遂性味苦寒入腎經瀉隧道水飲直達水飲所結之處面里煨熟非大水大實不可輕用商陸性味苦寒沉陰下行與大戟甘遂同功取白花之根黑豆拌蒸脾虛者忌用芫花性味苦溫通行水飲痰癖醋炒用毒性至緊取效甚捷稍涉虛者忌續隨子一名千金子性味辛溫行水破結利大小腸去殼研細去油皮脾虛便滑者忌牽牛性味辛熱入肺而兼入腎命大瀉水飲而走精髓通下焦郁遏大腸風秘氣秘有黑白二種黑者力速又名黑白二醜取子淘淨炒研用氣虛者忌之蓖麻子辛甘性熱善走亦善收能出有形滯物外用頗奏奇功氣味頗近巴豆內服不可輕試貫眾一名管仲味苦微寒瀉邪熱解疫毒射干一名烏扇烏翣性味苦寒入太陰厥陰能瀉實火火降則血散腫消而痰結自解為咽痛喉痹專藥蚤休一名重樓金線味苦微寒專治癰疽蛇毒為外科專藥玉簪一名白鶴仙即白鶴花根辛甘性寒塗癰腫解諸毒最能損齒去牙川大黃大苦大寒入足太陰手足陽明厥陰其性沉陰降泄酒製亦能上行盪滌腸胃為攻下實熱之專藥生用更峻苟非實熱內結不可輕投䕡如性味辛寒破癥瘕血結除熱痹排膿素問四烏鰂骨一䕡如丸用以治婦人血枯血結甚效天名精一名地松一名活鹿草一名蝦蟆藍辛甘性寒能除熱吐痰破血解毒根名杜牛膝功用相同鶴蝨即天名精子性味苦寒殺蟲治蛇為蛔咬腹痛專藥山慈菇甘微辛寒功專清熱解毒散結消癰搗塗蛇蟲狂犬傷茵芋辛苦微溫治風濕拘攣痹痛炙熟用莽草辛苦微溫祛風勝濕煎沐頭風疝瘕不入湯劑仙茅性味辛熱入腎命而助火興陽治虛勞失溺或陽虛溺閉專於補火助陽惟精寒火衰者宜之有火者切忌糯米泔浸去毒用蒼耳子一名葈耳即詩卷耳甘苦性溫善於發汗解散風濕上通腦頂下行足膝外達皮膚去刺酒蒸虛人忌之木鱉子味苦大寒力能利腸治瘡消腫追風僅可外科敷治不入湯藥鳳仙子一名急性子微苦微溫性急通竅催生墮胎透骨損齒與玉簪根同功花甘溫性滑活血能消積聚根葉苦甘微辛散血通經塗打撲腫痛土連翹性味苦溫入血分以祛風寒濕痹大損新血無瘀勿用菸草一名相思草性味辛溫入口而頃刻能周一身令人胸次爽快闢穢御瘴然過嗜則火氣灼人耗血損元養生家宜遠之卷之二中草部蔓草類何首烏甘苦微溫益肝補腎為平補陰血之良藥有赤白二種黑豆拌九蒸九曬用修制忌鐵腸滑者禁亦有土拌炒用者活血亦須曬炒治痹宜之菟絲子甘辛微溫入足三陰強陰益精為腎虛平補良藥取子搗蒸作餅或去油炒研用覆盆子甘酸澀溫補益肝腎為固精縮小便專藥淘淨搗餅或炒研用葉能收濕為末摻廉瘡濕爛北五味五味俱備酸鹹為多性溫入手太陰血分足少陰氣分斂肺滋腎專收耗散之氣為喘嗽虛乏多汗之專藥天門冬甘苦大寒入手太陰兼入足太陰清金降火益水之上源為虛勞挾熱潤燥治咳之專藥脾虛泄瀉者非宜百部甘苦微溫潤肺理嗽治疳殺蟲劈去心皮酒焙用馬兜鈴苦辛微寒輕虛象肺入肺而清金治嗽降氣定喘為濕熱傷肺專藥根名土青木香塗諸毒熱腫亦治疝疾瓜蔞實古名栝蔞甘苦性寒入肺胃而消痰解熱盪滌胸中垢膩殼主寬胸除熱仁主潤燥豁痰為治咳專藥炒研去油用亦有生用者腸滑均忌天花粉即栝蔞根粉酸甘苦寒降火止渴潤燥滑痰忌同栝蔞土瓜根古名王瓜性味苦寒瀉熱利水為實熱壅滯之專藥白蘞苦辛甘寒瀉火散結為斂瘡專藥赤者同功但走血分為異山豆根性味甘寒入心肺而瀉熱解毒為咽痛喉痹專藥金銀花性味甘涼入肺腸而清金治痢解毒除煩葉亦清肺稍遜淨花藤名忍冬乃清經活絡良藥痹症挾熱宜之薔薇根苦澀性冷解濕熱毒氣為瘡科外治專藥子名營實性味稍溫主治大略相同土茯苓甘淡性平滲利濕熱解毒治瘡為瘡科專藥俗名冷飯糰有赤白二種白者良萆薢甘苦性平入足陽明厥陰解利風寒濕痹為去濁分清專藥有黃白二種白者良防己大辛苦寒入足太陰兼行十二經瀉下焦血分濕熱十劑曰通可去滯通草防己之屬但通草甘淡瀉氣分濕熱防己苦寒瀉血分濕熱一類有二種治濕用漢防己治風用木防己為風濕腳氣專藥乾腳氣屬陰虛無濕者忌小木通甘淡辛寒入心小腸經降火利水為熱淋尿痛專藥妊婦勿用白通草味淡性平入肺胃而通淋利水下乳催生肺燥無濕者忌天仙藤即青木香藤性味苦溫力能疏氣活血為疝氣止痛專藥粉葛根辛甘性平入陽明而兼入脾經能鼓舞胃氣解肌發汗散熱止渴為升提清氣下陷泄瀉之專藥解肌生用升清煨用又能解酒葛花尤良鮮葛大寒搗汁能解溫病按葛根升陽明清氣柴胡升少陽清氣為異茜草一名血見愁酸鹹氣平入厥陰而行血止血無瘀勿用紫葳即凌霄花甘酸性寒入厥陰血分破血降火為女科專藥無瘀勿用孕婦尤忌威靈仙辛鹹氣溫善走經絡為痛風頑痹專藥色深黑俗名鐵腳威靈仙砂糖入酒煎服治骨哽頗驗鉤藤鉤甘微苦寒入心肝而定驚平熱專除目眩舒筋為肝氣相火專藥藤細鉤多者良久煎則無力使君子性味甘溫入脾胃而健運脾氣消積殺蟲為蟲積腹痛專藥旋花即纏枝牡丹性味甘辛力能補勞續筋汁滴傷處渣敷其上日三易半月斷筋即續雀梅葉一名爵梅葉性味酸寒治乳癰便毒有效卷之二下草部水草石草苔類建澤瀉甘鹹微寒入膀胱而兼入腎臟瀉濕熱利小便為陰分濕熱專藥腎虛無濕者忌按澤瀉木通俱是利藥但澤瀉瀉相火濕熱木通瀉心火濕熱為不同九節石菖蒲辛苦性溫芳香氣散力能通心利竅開鬱豁痰為驚癇氣閉專藥取根用血氣不足者忌蒲黃性味甘平入厥陰血分生用則性滑而通經破瘀炒黑則性澀而止血定崩無瘀勿服紫背浮萍性味辛寒輕浮入肺力能發汗祛風利水消腫非有風濕熱邪不可混施海藻苦鹹性寒軟堅破結滌熱消癭為瘰癧專藥海帶性味稍平下水消癭功同海藻昆布功同海藻而稍滑利性更雄烈多服令人瘦金石斛性味甘淡微咸微寒平胃氣而除虛熱益腎陰而安神志為胃虛挾熱傷陰專藥出霍山者功用相仿兼能開胃鮮者大寒尤能泄熱益陰味苦梗方質硬者名木斛不堪用骨碎補性味苦溫堅腎活血為折傷損骨專藥酒炒或蜜炒用石韋苦甘微寒入肺膀胱而清熱利水為通淋專藥古瓦上者名瓦韋性稍輕揚治淋亦佳金星草一名鳳尾草又名七星草性味苦冷瀉熱解毒並金石藥毒為外科專藥根入麻油搗汁塗之大生毛髮景天一名慎火草苦酸性寒入心瀉熱解毒並塗丹腫蛇傷血見愁一名地錦性味辛平散血止血為金刃撲損專藥無瘀勿服海苔鹹寒軟堅消癭瘤結氣為外科專藥卷柏炙用辛溫善能澀腸止血生用辛平力可破血通經馬屁勃性味辛平輕虛入肺消腫解熱為咽喉腫痛專藥卷之三上木部香木類柏子仁辛甘性平其氣芳香入心脾而安神益智潤燥舒脾多服反能致燥炒研去油油透勿用側柏葉味苦微寒性澀氣燥最清血分濕熱止血痢腸風血虛無濕熱者忌松香一名松脂又名瀝青苦甘溫燥燥濕祛風生肌化毒為外科敷治專藥松節苦溫性燥善祛骨節間風濕為痹症引經專藥酒浸用松毛性味苦溫能生毛髮血虛均宜禁忌松果性味溫潤能養心肺益氣除風可以釀酒西杉木一名杉材性味辛溫入肝肺而消心腹脹滿腳氣腫痛為疏堅散腫專藥挾虛者忌之杉葉治風蟲牙痛同芎藭細辛煎酒含漱杉子治疝氣痛一歲一粒研入酒服甜肉桂辛甘大熱入肝腎命門血分溫經補火引熱下行為血分虛冷之專藥去粗皮藥汁摩沖亦可煎服桂心性近肉桂厚去外皮入心脾血分而祛寒止痛內托排膿為治內不治外之專藥牡桂即大桂稟離火純陽之氣辛勝於甘而微帶苦性偏溫散而能上行治心腹冷痛筋脈拘攣不減肉桂若相火不歸下元虛冷其力不能直達下焦為稍遜耳上官桂一名筒桂辛甘性溫入經髓而宣通百脈導引諸藥有辛溫行散之功無壯火食氣之患經絡寒痹最宜之川桂枝辛甘微溫入手少陰而溫營散表發汗祛寒為傷寒中風營分散寒專藥按肉桂雖主下元總理中外氣血桂心專溫臟腑營血不行經絡氣分牡桂性兼上行統治表裡虛寒官桂善走脅肋不能直達下焦桂枝調和營衛解散風寒為異辛夷一名迎春花即木筆花性味辛寒輕浮入肺兼入胃經能引胃中清氣上行通於頭腦為腦熱鼻淵之專藥上沉香辛苦性溫諸木皆浮而沉香獨沉入右腎命門力能墮痰下氣為宣導下行專藥藥汁摩沖用陰虛血燥氣陷火炎均忌母丁香辛溫純陽入肺胃而溫中散滯為胃虛冷呃專藥小者名公丁香可供食料不入湯劑白檀香性味辛溫入脾肺氣分而兼入肝胃能引胃氣上行調中解鬱為治膈止吐專藥紫檀香性味溫平入肝脾血分力能調營消腫止血定痛然香耗動火陰虛者二香並忌降真香一名紫金藤性味辛溫入肝脾血分而活血止痛闢穢降真禁忌同紫白二檀臺烏藥辛溫香竄入脾肺而下及腎膀善疏邪逆之氣以致其平為降氣疏逆專藥血虛火炎者並忌滴乳香一名薰陸香苦溫辛香入心而通行十二經活血舒筋祛風止痛為治痹活絡專藥生研用明沒藥性味苦平入十二經散瘀破結消腫定痛為血痹消滯專藥微焙用血竭一名麒麟竭甘鹹性平入心肝血分散瘀降濁逆止血定急痛為血逆血痛昏危專藥無瘀勿用楓脂香即白膠香性味辛平活血解毒止痛生肌能亂乳香功亦相近安息香辛香苦平入心經而祛邪辟惡晰理血氣為去祟安神專藥研細用蘇合香甘溫辛竄通竅開鬱闢一切不正之氣殺精逐鬼虛人忌用梅花冰片一名龍腦香性味辛溫香竄善散入肺而傳於心脾透骨通竅散火逐邪細研用風在骨髓者宜之若在血脈肌肉反致引風入骨忌之樟腦辛熱香竄能於水中發火通關利滯除濕殺蟲置鞋中能去腳氣阿魏辛平氣臭入脾胃而善消肉積殺諸般惡蟲去臭氣細研用蘆薈大苦大寒入肺肝而清痼熱殺諸蟲胃虛者切忌胡桐淚苦鹹大寒能入骨軟堅瀉熱殺蟲為口齒諸病專藥卷之三中木部喬木類川黃柏苦寒微辛入膀胱而瀉相火除濕熱而滋腎水為堅腎退熱專藥鹽水炒或酒炒用胃虛無濕熱者忌槐實即槐角性味苦寒入大腸而兼入肝膽涼血寬腸為腸風血痔專藥人乳拌蒸用槐花蕊即槐米性稍輕揚功近槐角兼能治上槐花性發揚尤能涼血除風為風熱目赤下痢諸血專藥炒研用川楝子一名金鈴子性味苦寒入小腸膀胱而兼入心包導引濕熱下行為治疝專藥炒研用楝根皮專主殺蟲秦皮性味苦寒色青入肝性澀治痢為除熱平肝專藥樗根白皮即臭椿根皮苦寒性澀燥濕收斂入肺腸血分而止血痢為濕熱傷陰腸滑泄痢之專藥醋炒用臭椿葉功用相仿而力不及耳椿根白皮即香椿根皮功用相近而力稍遜之敗棕灰味苦性澀入血分而澀血止漏固經定崩燒存性用挾瘀血者忌沒石子一名無食子性味苦溫入腎而澀精秘氣為遺濁滑泄之專藥炒研用然性偏止澀不宜多用獨用訶子一名訶黎勒苦溫酸澀生用清金止咳炒用斂肺澀腸為肺虛腸滑咳嗽泄瀉之專藥川厚朴苦辛溫降入脾胃而散滿除濕消脹寬中虛者忌之肥皂莢一名皂角辛鹹性溫入肺大腸而兼入肝經搜風泄熱通竅湧痰為卒中通關利竅專藥蜜炙酥炙絞汁燒灰並皆可用虛人孕婦並忌皂角刺性味辛溫功近皂莢其鋒銳之氣直達病所潰堅香肥皂性味辛溫洗滌垢膩兼祛風濕為中風滌痰通竅專藥今浣衣亦皆用之水楊枝葉性味苦平泄滯起陷痘瘡頂䫏漿滯不起者可煎湯浴之西河柳枝葉一名赤檉柳甘鹹辛平疏風解毒能使痧疹斑邪外達砂糖拌炒入營分散邪砂糖調服西河柳末止疹後痢下清陽下陷而泄瀉者須炒焦用之榆白皮性味甘平入大小腸膀胱經滑胎利竅通利二便有赤白二種功用相近採皮為粉荒年亦暫可充飢海桐皮性味甘平入血分而祛風理濕殺蟲行經為頑痹風瘡專藥血虛忌之厚杜仲甘溫微辛入肝腎而補虛止痛安胎續筋為腰膝諸痛專藥鹽水炒或酒炒用合歡皮性味甘平入心脾而怡神悅志令人歡樂無憂故曰蕪荑仁辛苦性溫入腸胃而殺蟲化積為腹中蟲痛專藥烏桕木根皮苦涼沉降利水通腸功近大戟搗汁飲解砒毒葉更勝性極瀉虛人並忌之桕油塗腫毒瘡疥有功蘇木一名蘇方木甘鹹辛平入三陰血分行血去瘀宣通表裡風邪忌鐵無瘀勿用乾漆辛溫毒烈功專破血殺蟲血見乾漆即化為水炒令煙盡血非陳年久積勿用漆得蟹汁亦化為水其蟹黃尤勝大風子性味辛熱有毒攻毒取油入藥治瘡殺蟲巴豆霜辛熱大毒下臟腑沉寒通經絡墮胎最為斬關奪門之將按大黃巴豆同為峻下之劑但大黃性寒腑結多熱者宜之巴豆性熱臟積多寒者宜之卷之三下木部灌木苞木寓木類桑根白皮甘辛性寒入肺而瀉火清肺理嗽定喘為肺受濕熱喘嗽專藥瀉火生用定喘蜜炙肺虛無火及風寒喘嗽均忌嫩桑枝性味苦平橫行手臂祛風濕通關節為風寒濕痹肢節疼痛引經專藥酒炒用冬桑葉即經霜桑葉苦甘性涼入肺而清肅氣化除燥退熱為肺虛挾熱專藥干桑椹一名文武實甘酸性溫色黑入腎滋腎壯水烏須黑髮鮮者瀘汁熬膏蜜收入燒酒經久彌佳桑寄生苦甘性平入肝腎而除風理濕壯骨強筋為腰膝痛痹專藥楮實一名谷實性味甘寒利水消腫軟堅治哽酒拌蒸用楮皮甘平性善行水治水腫氣滯楮葉甘涼專祛濕熱治瘴痢疫痢小枳實苦酸微寒消痞寬脹破氣攻堅通腸胃以利胸膈江枳殼味苦性平消痞化滯瀉氣行痰快胸膈以寬腸胃按枳實枳殼同一種但枳實力猛枳殼力緩俱宜炒熟生用尤峻胃虛腸滑均忌紅山梔性味苦寒入心肝而兼入三焦瀉心肝邪熱引三焦之鬱火曲屈下行內熱用仁表熱用皮瀉火生用炒黑止血薑汁炒止煩嘔而解鬱熱虛者忌之酸棗仁甘酸性潤入心脾肝膽生用酸平益肝膽以寧心斂汗熟酸溫醒脾氣以養血安神蕤仁味甘微寒入肝而消風清熱退翳明目有養肝益陰之功生研用山萸肉酸澀微溫入腎而固精秘氣補腎養肝為腎虛精滑酸澀專藥核能滑精揀淨用金櫻子酸澀性平入腎膀而澀精固氣止遺濁滑精炒研用郁李仁辛苦甘平入肝脾而散結潤燥下氣行水酒引入膽兼治膽橫目脹不瞑虛者忌之女貞子甘苦性涼入少陰而益陰退熱為陰虛有火不勝膩補之良藥退熱生用益陰炒用五加皮辛苦性溫入肝腎而祛風理濕壯骨強筋為損傷及風痹專藥酒炒用甘枸杞甘潤性平入腎而補腎養肝生精潤燥便滑者忌地骨皮甘淡性寒入肺而兼入腎肝除肌表虛熱退有汗骨蒸米泔飲泡用即枸杞根皮天精草即枸杞藤葉苦甘性涼專清心肺客熱虛勞熱盛可暫用代茶石南葉辛苦性平入腎而祛風堅腎通利關節為腳弱風痹專藥微炒用蔓荊子苦辛性平入肝搜風而治頭痛齒痛為輕浮疏散風熱之專藥川槿皮性味苦涼入肺胃而專祛濕熱為血痢癬瘡專藥取根皮用木芙蓉性味辛平涼血解毒為敷治癰疽腫毒專藥取花葉用狗骨即貓兒刺俗名老鼠刺又名八角茶甘微苦涼入肝腎而益陰祛風狗骨皮浸酒令人腰腳健南燭葉一名南天燭苦酸澀平益氣強筋久服輕身天燭子甘平功力尤勝枸橘葉性味辛溫散滯疏結治下利後重枸橘子味酸苦平破氣尤烈虛人忌之山茶花微辛甘寒涼血止血治吐衄塗湯火傷灼子研細末摻發解發䐈密蒙花味甘微寒入肝潤燥去翳明目有消風散熱之功八角金盤味苦辛溫性烈有毒祛瘀開結治痛麻頑痹取根皮用柞木俗名鑿柄木性味苦平下行利竅易產催生舊鑿柄卷轉者尤妙搗葉塗癰疽腫毒牡荊瀝俗名黃荊瀝性味甘平祛風治癇化痰行經熱痰宜竹瀝寒痰宜荊瀝俱宜薑汁助送則不凝滯經絡甜竹瀝性味甘寒降陰虛之火清經絡之痰薑汁為佐治痰行經甚捷甜竹茹味甘微寒入肺胃而清燥解鬱薑汁拌炒為開鬱止嘔專藥去青刮皮用捲心竹葉辛淡甘寒涼心止嘔解鬱除煩天竺黃性味甘寒清心利竅豁痰定驚乃竹之津氣結成片片如竹節者真明琥珀味甘淡平入心肝血分安神散瘀利水通淋陰虛血少忌白茯苓甘淡性平入肺膀而兼入心脾滲濕利竅益脾寧心赤茯苓入心小腸經專於滲利濕熱益脾氣白勝利濕熱赤勝茯苓皮專走皮膚行水氣治膚腫效赤白茯神主治與茯苓略同而入心之用多治驚悸效去皮及中木用茯神心木治諸經攣縮喎僻偏風楓豬苓苦甘淡平入膀腎而利濕行水功勝茯苓但無益脾之效虛人無濕忌之白雷丸性味苦寒入腸胃而殺蟲消積乃竹之餘液得霹靂之氣而生微焙用卷之四上果部山果誇果味果蓏果水果扁杏仁辛苦甘溫入肺而疏肺降氣解邪化痰為咳逆胸滿之專藥去皮尖研腸滑者忌亦可生研去油炒熟用揀去雙仁炒黑能解鬱消積如索粉豆粉狗肉之類杏子辛熱損人孕婦忌之巴旦杏仁性味甘平止咳下氣潤燥豁痰為勞嗽無熱之專藥烏梅肉味酸澀溫入厥陰而兼入太陰澀腸斂肺醒酒殺蟲為吐痢收斂虛脫之專藥白梅即鹽梅酸澀鹹平軟筋斂液功近烏梅而不經燻黑無殺蟲收脫之功梅葉治霍亂搗汁飲之桃仁苦平微甘入厥陰而調經破瘀潤燥通腸去皮尖研如泥用腸滑者忌桃花苦平入血分而消積下滯利水除痰為痰飲滯血專藥誤服瀉人桃葉苦平殺蟲發汗桃子辛酸甘熱多食壅熱生瘍正月採桃名桃梟辟邪祟桃干在樹名僵桃縮邪汗栗子味甘微咸生平熟溫入腎而補腎厚腸生則難化熟則滯氣小兒不可多啖大棗性味甘溫補益中氣滋養心脾佐以生薑為調和營衛專藥中滿忌之紅棗甘而不滯專入心脾佐心浮麥為止自汗盜汗專藥水梨甘寒清心潤肺消風利腸生則可清六腑之熱熟則能滋五臟之陰瀉火搗汁滋陰熬膏生嚼尤能舒泄邪熱草梨瀉熱殊少益陰之效其性尤滑脾虛泄瀉切忌柿子鮮柿甜冷清潤肺胃可除血痢乾柿甘寒涼澀肺腸能止便紅柿霜即乾柿津液清肺潤燥治膈豁痰虛寒滑腸均忌柿蒂苦平降氣配以丁香為胃虛呃逆專藥宣州木瓜酸澀性溫醒脾祛暑和胃發汗為轉筋霍亂痛痹腳氣專藥山查肉一名棠球子酸甘微溫消食化積散瘀破症俱宜炒熟生用能發痧斑痘疹新會皮即新會縣橘皮性味辛溫微苦微燥入脾胃而理氣化痰和中快膈久服亦能耗氣橘白即新會白功專和胃進食橘紅即新會紅又名杜橘紅力能利氣化痰陳久者良化州者勝勿偽榴皮會皮古名陳皮一種廣皮單取外面薄皮即名廣橘紅功專入肺理嗽散寒連白功同陳皮而性稍烈陰虛肺胃燥熱者均忌小青皮辛苦酸溫色青氣烈入肝而破氣削堅為厥陰破氣平肝專藥醋炒用橘葉消癰散滯橘囊聚氣滑痰橘核散結消滯為疝痛結核專藥炒用佛手柑辛苦酸溫入肺而理氣止嗽化滯定痛根葉散滯同功陳香櫞古名香臠苦甘酸辛性平而下氣快膈化食消痰為中脘氣滯實痛專藥花紅古名林檎酸澀甘溫生津止渴治泄精久痢小兒多食能壅氣發熱枇杷葉性味苦辛平肝清肺降氣化痰為咳逆吐逆喘逆專藥刷淨毛毛射肺令人咳止咳定喘蜜水炙止嘔定吐薑汁炒枇杷葉煎汁收膏潤燥止咳枇杷葉蒸熟吊露清徹達邪枇杷肉甘酸性平潤肺定咳止渴除煩楊梅酸甘性溫止渴生津澀腸治痢火酒浸良石榴皮酸澀性溫澀腸止久痢醋炒用浸汁可染須石榴肉酸甘性澀能止崩中久痢多食損肺壞齒石榴花涼心止衄千葉者良白果一名銀杏甘苦性澀生則豁痰清肺可止帶濁熟則溫肺定哮能縮小便多食令人壅氣胡桃肉味甘性溫肉潤皮澀入命門而溫肺補腎養血潤燥油者有毒殺蟲治瘡殼外青皮壓油可染鬚髮榛子性味甘平調中益氣充胃實腸令人不飢兼能殺蟲油壞勿用荔枝核甘澀性溫散寒行滯為㿗疝囊腫專藥荔枝肉甘酸性熱止呃除煩多食令人熱殼發痘瘡花皮根汁